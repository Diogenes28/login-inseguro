name: Veracode Pipeline Scan

# 🚀 Dispara este workflow automaticamente quando houver push na branch main
on:
  push:
    branches: [main]

jobs:
  pipeline_scan:
    runs-on: ubuntu-latest  # 🌐 Roda na nuvem (GitHub Actions)

    steps:
      # 📥 Passo 1: Clona o código do repositório
      - name: Checkout do repositório
        uses: actions/checkout@v3

      # 🔍 Passo 2: Executa o Veracode Pipeline Scan
      - name: Executar Veracode Pipeline Scan
        uses: veracode/Veracode-pipeline-scan-action@d5dbb47cb0202d511be5fd10a04071d32f74ace6  # ✅ Usa a versão correta
        with:
          vid: ${{ secrets.VERACODE_API_ID }}      # 🔐 ID da API Veracode (armazenado em segredo)
          vkey: ${{ secrets.VERACODE_API_KEY }}     # 🔐 Key da API Veracode (armazenado em segredo)
          file: login-inseguro.zip                       # 📁 Local onde está o código-fonte
          debug: true                               # 🐞 Ativa modo de depuração

      - name: Converter JSON para SARIF
        uses: veracode/veracode-pipeline-scan-results-to-sarif@master
        with:
          file: results.json
          fail_build: false

      - name: Enviar SARIF para Code Scanning
        uses: github/codeql-action/upload-sarif@v3  # Updated version
        with:
          sarif_file: results.sarif
