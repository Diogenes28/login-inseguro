name: Veracode Scan, Fix e Code Scanning

on:
  workflow_dispatch:  # Executa manualmente

jobs:
  veracode_job:
    runs-on: ubuntu-latest

    steps:
      # 📥 Clona o repositório
      - name: Checkout do repositório
        uses: actions/checkout@v3

      # 🛡️ Executa o Veracode Pipeline Scan
      - name: Executar Veracode Pipeline Scan
        uses: veracode/veracode-pipeline-scan-action@v1.0.18
        with:
          vid: ${{ secrets.VERACODE_API_ID }}
          vkey: ${{ secrets.VERACODE_API_KEY }}
          file: ./  # Pode ser ajustado para apontar para um .zip, .war, etc., se necessário
          fail_build: false  # Evita falhas no build em caso de vulnerabilidades

      # ⚠️ Garante que o arquivo results.json foi gerado
      - name: Verificar se results.json existe
        run: |
          if [ ! -f results.json ]; then
            echo "results.json não encontrado. Certifique-se de que o Veracode Pipeline Scan gerou esse arquivo."
            exit 1
          else
            echo "results.json encontrado com sucesso."
          fi

      # 🛠️ Executa o Veracode Fix com os parâmetros corretos
      - name: Executar Veracode Fix
        uses: veracode/veracode-fix@1592857014f0d4fd4feb1cde056377814787e696
        with:
          vid: ${{ secrets.VERACODE_API_ID }}
          vkey: ${{ secrets.VERACODE_API_KEY }}
          inputFile: results.json              # Arquivo com os resultados do scan
          source_base_path_1: '.'              # Caminho da base do código-fonte
          fixType: batch                       # batch = corrige tudo possível
          createPR: false                      # true se quiser PRs automáticos
          codeSuggestion: false                # Sugestões no estilo IDE
          debug: true                          # Ativa modo de depuração

      # 🔄 Converte JSON para SARIF (formato reconhecido pelo GitHub Code Scanning)
      - name: Converter results.json para SARIF
        uses: veracode/veracode-pipeline-scan-results-to-sarif@master
        with:
          input: results.json
          output: results.sarif

      # 📤 Envia o SARIF para o GitHub Code Scanning
      - name: Enviar relatório SARIF para o GitHub
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
