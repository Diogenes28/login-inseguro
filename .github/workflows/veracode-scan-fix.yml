name: Veracode Scan, Fix e Code Scanning

on:
  workflow_dispatch:  # Permite execução manual do workflow

jobs:
  veracode_job:
    runs-on: ubuntu-latest

    steps:
      # 📥 Etapa 1: Clona o repositório
      - name: Checkout do repositório
        uses: actions/checkout@v3

      # 🛡️ Etapa 2: Executa o Veracode Pipeline Scan
      - name: Executar Veracode Pipeline Scan
        uses: veracode/veracode-pipeline-scan-action@v1.0.18
        with:
          vid: ${{ secrets.VERACODE_API_ID }}
          vkey: ${{ secrets.VERACODE_API_KEY }}
          file: ./                          # Caminho do código-fonte ou pacote compactado (.zip, .war etc.)
          fail_build: false                # Continua mesmo com vulnerabilidades

      # 🔍 Etapa 3: Verifica se o arquivo results.json foi gerado
      - name: Verificar se results.json foi gerado
        run: |
          if [ ! -f results.json ]; then
            echo "❌ results.json NÃO foi gerado. O Pipeline Scan pode ter falhado ou não encontrou vulnerabilidades."
            exit 1
          else
            echo "✅ results.json encontrado com sucesso!"
            echo "🔎 Primeiras linhas do arquivo:"
            head -n 20 results.json
          fi

      # 🛠️ Etapa 4: Executa o Veracode Fix
      - name: Executar Veracode Fix
        uses: veracode/Veracode-pipeline-scan-action@d5dbb47cb0202d511be5fd10a04071d32f74ace6
        with:
          vid: ${{ secrets.VERACODE_API_ID }}
          vkey: ${{ secrets.VERACODE_API_KEY }}
          inputFile: results.json              # Arquivo com os resultados do scan
          source_base_path_1: '.'              # Caminho base do código-fonte
          fixType: batch                       # Corrige tudo possível automaticamente
          createPR: false                      # true = cria Pull Requests com correções
          codeSuggestion: false                # false = sem sugestões estilo IDE
          debug: true                          # true = mais detalhes no log

      # 🔄 Etapa 5: Converte results.json para SARIF (formato compatível com o GitHub Code Scanning)
      - name: Converter results.json para SARIF
        uses: veracode/veracode-pipeline-scan-results-to-sarif@v1.0.0
        with:
          input: results.json
          output: results.sarif

      # 🧪 Etapa 6: Verifica se results.sarif foi criado corretamente
      - name: Verificar se results.sarif foi gerado
        run: |
          if [ ! -f results.sarif ]; then
            echo "❌ results.sarif NÃO foi gerado. Falha na conversão."
            exit 1
          else
            echo "✅ results.sarif gerado com sucesso!"
          fi

      # 📤 Etapa 7: Envia o relatório SARIF para o GitHub Code Scanning
      - name: Enviar relatório SARIF para o GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: results.sarif
