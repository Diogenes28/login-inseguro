name: Veracode Scan + Fix

on:
  workflow_dispatch:  # Executa manualmente

jobs:
  pipeline_scan:
    name: 🔍 Veracode Pipeline Scan
    runs-on: ubuntu-latest

    steps:
      # 📥 Clona o repositório
      - name: Checkout do código
        uses: actions/checkout@v3

      # 🧪 Executa o scan com a ação oficial da Veracode
      - name: Executar Veracode Pipeline Scan
        uses: veracode/scan-action@v1.1.8
        with:
          vid: ${{ secrets.VERACODE_API_ID }}         # ID da API
          vkey: ${{ secrets.VERACODE_API_KEY }}        # Key da API
          file: '.'                                     # Caminho do projeto
          type: directory                               # Tipo de input (diretório)
          debug: true                                   # Modo de depuração
          scan_type: pipeline                           # Tipo de scan
          fail_build: false                             # Evita falhar se vulnerabilidades forem encontradas
          output: results.json                          # Salva resultado no arquivo JSON

      # 💾 Salva o results.json como artefato para o próximo job
      - name: Salvar results.json como artefato
        uses: actions/upload-artifact@v3
        with:
          name: veracode-results
          path: results.json

  fix_job:
    name: 🛠️ Veracode Fix
    runs-on: ubuntu-latest
    needs: pipeline_scan   # Só roda após o scan

    steps:
      # 📥 Clona o repositório
      - name: Checkout do código
        uses: actions/checkout@v3

      # 📦 Baixa o results.json salvo pelo job anterior
      - name: Baixar results.json do artefato
        uses: actions/download-artifact@v3
        with:
          name: veracode-results

      # 🛠️ Executa o Veracode Fix
      - name: Executar Veracode Fix
        uses: veracode/veracode-fix@1592857014f0d4fd4feb1cde056377814787e696
        with:
          vid: ${{ secrets.VERACODE_API_ID }}
          vkey: ${{ secrets.VERACODE_API_KEY }}
          inputFile: results.json              # Arquivo com os resultados do scan
          source_base_path_1: '.'              # Caminho do código-fonte
          fixType: batch                       # Corrige tudo possível (batch)
          createPR: false                      # true se quiser criar PR automático
          codeSuggestion: false                # Sugestões em estilo IDE
          debug: true                          # Ativa modo de depuração
